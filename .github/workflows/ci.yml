name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**", "chore/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 冒烟测试（不需要 GPU / Ollama / 真实 Chroma）────────────
  smoke-test:
    name: Smoke Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # 只装轻量依赖，跳过 torch / sentence-transformers（CI 里全部被 stub）
      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi \
            "uvicorn[standard]" \
            starlette \
            pydantic \
            httpx \
            python-multipart \
            loguru \
            numpy \
            chromadb \
            cryptography \
            reportlab \
            pytest \
            pytest-asyncio

      - name: Run smoke tests
        run: pytest -v --tb=short

  # ── 前端构建 (Vite + Vue 3, RFC Phase 1 起) ──────────────────
  # 仅在修改了 frontend/ / static/design/ 或 docker / CI 配置本身时跑,
  # 改 app/* / main.py 不会触发本 job。如果想强制跑,可以临时去掉 paths 过滤。
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # 没有 lockfile 时 fallback 到 npm install —— Phase 1 PR 第一次落地时
        # lock 还没生成;后续 PR 必须带 lockfile,否则 cache 失效
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Run unit tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify build artifact
        # Phase 1 Done 定义之一:产物里能找到 index.html
        run: |
          test -f static/v2/index.html
          echo "OK: static/v2/index.html present"
          ls -la static/v2/

  # ── Docker 镜像构建验证（不推送）────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # 只在推 main 或打 PR 时跑，节省 CI 时间
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: zhihu-yinban:ci
          # 缓存层，加快后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
